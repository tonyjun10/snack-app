<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 / Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f6f2; --surface: #fff; --border: #e5e2d9;
      --accent: #111111; --text: #1a1814; --text-muted: #7a7670;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--surface);
      border: 2px solid var(--text);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 6px 6px 0 var(--text);
    }
    .login-logo {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text);
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 2rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem; }
    .form-label {
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      font-family: 'Space Mono', monospace; color: var(--text-muted);
    }
    .form-input {
      padding: 0.75rem 1rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--text); background: #fff; }
    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: var(--text);
      color: #fff;
      border: 2px solid var(--text);
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #333; border-color: #333; }
    .error-msg {
      background: #fff1f0;
      border: 2px solid #ffa39e;
      color: #cf1322;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">🍿 ADMIN</div>
    <h1>관리자 로그인</h1>
    <p class="subtitle">Admin Login</p>
    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label" for="pw">비밀번호 / Password</label>
        <input class="form-input" type="password" id="pw" name="password"
               placeholder="••••••••" autofocus required>
      </div>
      <button type="submit" class="btn-login">로그인 / Login</button>
    </form>
    <a href="/" class="back-link">← 메인으로 / Back to Main</a>
  </div>
</body>
</html>
